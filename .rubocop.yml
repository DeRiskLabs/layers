plugins:
  - rubocop-performance
  - rubocop-rake
  - rubocop-rspec

require:
  - ./.rubocop/cops/layout/private_two_lines.rb

AllCops:
  TargetRubyVersion: 3.1
  NewCops: disable
  Exclude:
    - 'bin/**/*'
    - 'vendor/**/*'
    - 'tmp/**/*'
    - 'coverage/**/*'

# Custom cops

Layout/PrivateTwoLines:
  Enabled: true

# Whitespace is deliberate — keep it the author's way

Layout/EmptyLines:
  Enabled: false

Layout/EmptyLineBetweenDefs:
  Enabled: false

Layout/EmptyLinesAroundClassBody:
  Enabled: false

Layout/EmptyLinesAroundModuleBody:
  Enabled: false

Layout/EmptyLinesAroundBlockBody:
  Enabled: false

Layout/EmptyLinesAroundExceptionHandlingKeywords:
  Enabled: false

Layout/EmptyLineAfterGuardClause:
  Enabled: false

# A blank line after the final inclusion in a list, not after each one

Layout/EmptyLinesAfterModuleInclusion:
  Enabled: true
  Exclude:
    - 'spec/**/*'

Layout/LineLength:
  Max: 100

# fail to signal a new exception, raise to re-raise

Style/SignalException:
  EnforcedStyle: semantic

# Constant-base prefixes disambiguate shadowed names (Layers::Logger vs ::Logger)

Style/RedundantConstantBase:
  Enabled: false

Style/StringLiterals:
  EnforcedStyle: single_quotes

Style/StringLiteralsInInterpolation:
  EnforcedStyle: single_quotes

Style/SymbolArray:
  EnforcedStyle: brackets

Style/WordArray:
  EnforcedStyle: brackets

# Eliminate unnecessary diff: enforce trailing commas on multiline

Style/TrailingCommaInArguments:
  EnforcedStyleForMultiline: comma

Style/TrailingCommaInArrayLiteral:
  EnforcedStyleForMultiline: comma

Style/TrailingCommaInHashLiteral:
  EnforcedStyleForMultiline: comma

# Comments are lies

Style/Documentation:
  Enabled: false

Metrics/BlockLength:
  Exclude:
    - 'spec/**/*'

Metrics/MethodLength:
  Max: 12
  CountComments: false
  CountAsOne:
    - heredoc
    - method_call

# Spec idioms follow the house testing style, not RSpec cop defaults

RSpec/DescribedClass:
  Enabled: false

RSpec/HookArgument:
  Enabled: false

RSpec/IndexedLet:
  Enabled: false

RSpec/LeadingSubject:
  Enabled: false

RSpec/LetBeforeExamples:
  Enabled: false

RSpec/SubjectStub:
  Enabled: false

RSpec/VerifiedDoubles:
  Enabled: false

RSpec/VerifiedDoubleReference:
  Enabled: false

RSpec/NestedGroups:
  Enabled: false

RSpec/MultipleMemoizedHelpers:
  Max: 10

RSpec/ExampleLength:
  Max: 10
